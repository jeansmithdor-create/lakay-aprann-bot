<title>LakayAprann — Aprann, Grandi, Reyisi</title>
<meta name="description" content="LakayAprann: Platfòm aprantisaj sou WhatsApp an krèyòl ayisyen. Aprann itilize telefòn entelijan, antreprenarya, lang anglè ak plis ankò.">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--surface:#ffffff;--surface-alt:#f5f5f4;
  --text:#1c1917;--text-muted:#78716c;--text-subtle:#a8a29e;
  --green:#22c55e;--green-dark:#16a34a;--green-light:#dcfce7;
  --border:#e7e5e4;
  --radius:12px;--radius-sm:8px;--radius-lg:20px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
html{font-family:var(--font);font-size:15px;line-height:1.5;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--green-dark);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header svg{width:32px;height:32px;flex-shrink:0}
.header-text h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header-text p{font-size:12px;opacity:.85;font-weight:400}

/* Main layout */
.main{flex:1;display:flex;flex-direction:column;max-width:520px;width:100%;margin:0 auto;padding:0}

/* Info banner */
.info-banner{background:var(--green-light);border-bottom:1px solid #bbf7d0;padding:12px 20px;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#15803d;line-height:1.45}
.info-banner svg{width:18px;height:18px;flex-shrink:0;margin-top:1px}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:6px;background:linear-gradient(180deg,#f0fdf4 0%,var(--bg) 100%);min-height:420px}

.msg{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.5;border-radius:var(--radius);position:relative;animation:msgIn .25s cubic-bezier(.16,1,.3,1)}
.msg-bot{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg-user{align-self:flex-end;background:var(--green-dark);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;margin-top:4px;opacity:.5;text-align:right}
.msg-bot .msg-time{text-align:left}
.msg pre,.msg code{white-space:pre-wrap;font-family:inherit}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Typing indicator */
.typing{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;padding:10px 16px;display:none;gap:4px;align-items:center}
.typing.active{display:flex}
.typing span{width:7px;height:7px;background:var(--text-subtle);border-radius:50%;animation:typeBounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Input area */
.input-area{padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;bottom:0}
.input-field{flex:1;border:1px solid var(--border);border-radius:24px;padding:10px 18px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .18s;background:var(--surface-alt)}
.input-field:focus{border-color:var(--green)}
.input-field::placeholder{color:var(--text-subtle)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--green-dark);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .18s cubic-bezier(.16,1,.3,1),background .18s}
.send-btn:hover{transform:scale(1.08);background:#15803d}
.send-btn:active{transform:scale(.95)}
.send-btn svg{width:18px;height:18px;fill:#fff}

/* Quick replies */
.quick-replies{display:flex;gap:6px;flex-wrap:wrap;padding:6px 16px 10px}
.quick-btn{background:var(--surface);border:1px solid var(--green);color:var(--green-dark);font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .18s}
.quick-btn:hover{background:var(--green);color:#fff}

/* Footer */
.footer{text-align:center;padding:12px;font-size:11px;color:var(--text-subtle)}
.footer a{color:var(--text-muted);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Mobile */
@media(max-width:540px){
  .main{max-width:100%}
  .msg{max-width:88%}
}
</style>
</head>
<body>

<header class="header">
  <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="LakayAprann logo">
    <rect x="2" y="4" width="28" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
    <path d="M8 12h6M8 16h10M8 20h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="23" cy="20" r="4" fill="#fff" opacity=".3"/>
    <path d="M21.5 20l1.5 1.5 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="header-text">
    <h1>LakayAprann</h1>
    <p>Aprann, Grandi, Reyisi — nan lang ou</p>
  </div>
</header>

<main class="main">
  <div class="info-banner">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
    <span>Simulatè chatbot WhatsApp LakayAprann. Voye yon mesaj pou kòmanse kou gratis la!</span>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="quick-replies" id="quickReplies"></div>

  <div class="input-area">
    <input type="text" class="input-field" id="msgInput" placeholder="Ekri mesaj ou a..." autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="Voye">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</main>

<footer class="footer">
  LakayAprann &copy; 2026 &middot;
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<script>
const API = "__PORT_8000__";
const chatArea = document.getElementById("chatArea");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const typing = document.getElementById("typing");
const quickReplies = document.getElementById("quickReplies");

const userId = "web_" + Math.random().toString(36).slice(2, 10);
let sending = false;

function addMsg(text, isUser) {
  const div = document.createElement("div");
  div.className = "msg " + (isUser ? "msg-user" : "msg-bot");
  
  // Format text
  const formatted = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\n/g, "<br>");
  
  const now = new Date();
  const time = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  
  div.innerHTML = formatted + '<div class="msg-time">' + time + "</div>";
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showQuickReplies(text) {
  quickReplies.innerHTML = "";
  const btns = [];
  
  if (text.includes("1️⃣") || text.includes("1⃣")) {
    btns.push({label: "1 — Kòmanse kou", value: "1"});
    btns.push({label: "2 — Tout kou yo", value: "2"});
    btns.push({label: "3 — Konsèy", value: "3"});
  } else if (text.includes("A)") && text.includes("B)") && text.includes("C)")) {
    btns.push({label: "A", value: "a"});
    btns.push({label: "B", value: "b"});
    btns.push({label: "C", value: "c"});
  } else if (text.includes("menu")) {
    btns.push({label: "Menu", value: "menu"});
  }
  
  btns.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "quick-btn";
    btn.textContent = b.label;
    btn.onclick = () => sendMessage(b.value);
    quickReplies.appendChild(btn);
  });
}

async function sendMessage(text) {
  if (!text || sending) return;
  text = text.trim();
  if (!text) return;
  
  sending = true;
  msgInput.value = "";
  addMsg(text, true);
  quickReplies.innerHTML = "";
  
  typing.classList.add("active");
  chatArea.scrollTop = chatArea.scrollHeight;
  
  try {
    const res = await fetch(API + "/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text, user_id: userId})
    });
    const data = await res.json();
    
    // Simulate typing delay
    const delay = Math.min(800 + data.reply.length * 8, 2500);
    await new Promise(r => setTimeout(r, delay));
    
    typing.classList.remove("active");
    addMsg(data.reply, false);
    showQuickReplies(data.reply);
  } catch (err) {
    typing.classList.remove("active");
    addMsg("⚠️ Erè koneksyon. Eseye ankò.", false);
  }
  sending = false;
}

sendBtn.addEventListener("click", () => sendMessage(msgInput.value));
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage(msgInput.value);
  }
});

// Auto-start
window.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => sendMessage("bonjou"), 600);
});
</script>
</body>
</html>
