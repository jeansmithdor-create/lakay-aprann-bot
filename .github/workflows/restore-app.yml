name: Restore app.py

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/restore-app.yml']

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download full app.py
        run: |
          curl -L 'https://dpaste.com/4GEAL8TDV.txt' -o app.py
          wc -l app.py
          echo "First line: $(head -1 app.py)"
          echo "Last line: $(tail -1 app.py)"

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add app.py
          git diff --staged --stat
          git commit -m 'feat: intégrer paiement MonCash pour cours payants (v3.0.0)' || echo 'Nothing to commit'
          git push
