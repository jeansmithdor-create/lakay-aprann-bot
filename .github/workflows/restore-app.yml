name: Restore app.py

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/restore-app.yml']

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download full app.py
        run: |
          curl -fL 'https://dpaste.com/4GEAL8TDV.txt' -o app.py
          wc -l app.py
          echo "Download successful: $(head -1 app.py)"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add app.py
          git status
          git diff --staged --stat
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'feat: integrer paiement MonCash pour cours payants (v3.0.0)'
            git push origin main
            echo 'Push successful!'
          fi
